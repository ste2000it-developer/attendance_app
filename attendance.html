<!DOCTYPE html>
<html lang="th">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&family=Lexend+Giga:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <title>Attendance</title>

  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#0b3188">

  <link rel="stylesheet" href="attendance.css">
</head>

<body>
  <div class="attendance-app">
    <main class="main-content">

      <!-- HOME -->
      <section id="homeSection" class="page-section active">
        <div class="home-shell">

          <section class="time-card">
            <div class="time-card-header">
              <span class="material-symbols-outlined">schedule</span>
              <p class="time-card-title">เวลาปัจจุบัน</p>
            </div>

            <p id="currentTime" class="current-time">--:--</p>

            <div class="divider"></div>

            <p id="currentDate" class="current-date">--</p>

            <div class="work-time-row">
              <div class="work-time-item">
                <span class="work-time-label">เข้างาน:</span>
                <span id="checkInDisplay" class="work-time-value">--:--</span>
              </div>

              <div class="work-time-item">
                <span class="work-time-label">ออกงาน:</span>
                <span id="checkOutDisplay" class="work-time-value">--:--</span>
              </div>
            </div>
          </section>

          <div class="location-row">
            <span class="material-symbols-outlined">location_on</span>
            <p class="location-text">
              <span class="location-label">สถานที่:</span>
              <span id="siteDisplay" class="location-value">กำลังตรวจตำแหน่ง...</span>
            </p>
          </div>

          <button id="mainActionBtn" class="main-action-btn state-checkin">
            เข้างาน
          </button>

          <div class="logic-only">
            <p id="statusText">ยังไม่ได้เข้างาน</p>
            <p id="subStatusText">พร้อมเริ่มงาน</p>
          </div>

        </div>
      </section>

      <!-- PROFILE -->
      <section id="profileSection" class="page-section">
        <div class="employee-card">
          <div class="employee-card-top">
            <p class="company-name">S.TUNTIVIVAT ENGINEERING 2000</p>
            <p class="company-subtitle">EMPLOYEE PROFILE</p>
          </div>

          <div class="employee-card-body">
            <div class="profile-line">
              <span class="profile-label">Email</span>
              <span id="profileEmail" class="profile-value">-</span>
            </div>

            <div class="profile-line">
              <span class="profile-label">UID</span>
              <span id="profileUid" class="profile-value">-</span>
            </div>
          </div>
        </div>

        <div class="profile-actions">
          <button id="logoutBtn" class="logout-btn">ออกจากระบบ</button>
        </div>
      </section>

      <!-- LEAVE -->
      <section id="leaveSection" class="page-section">
        <div class="coming-soon-card">
          <h2>หน้าลางาน</h2>
          <p>กำลังพัฒนา...</p>
        </div>
      </section>

    </main>

    <!-- 🔥 FIXED NAV -->
    <nav class="bottom-nav">

      <button id="homeTabBtn" class="nav-btn active">
        <span class="nav-icon material-symbols-outlined">home</span>
        <span class="nav-text">หน้าหลัก</span>
      </button>

      <button id="profileTabBtn" class="nav-btn nav-btn-center">
        <span class="nav-icon material-symbols-outlined">person</span>
        <span class="nav-text">โปรไฟล์</span>
      </button>

      <button id="leaveTabBtn" class="nav-btn">
        <span class="nav-icon material-symbols-outlined">description</span>
        <span class="nav-text">ลา</span>
      </button>

    </nav>

  </div>

  <!-- LOADING -->
  <div id="appLoadingOverlay" class="app-loading-overlay">
    <div class="app-loading-card">
      <div class="app-loading-spinner"></div>
      <p class="app-loading-title">กำลังโหลดข้อมูล</p>
      <p id="appLoadingText" class="app-loading-text">กรุณารอสักครู่...</p>
    </div>
  </div>

  <!-- POPUP -->
  <div id="popupOverlay" class="popup-overlay hidden">
    <div class="popup-card">
      <p id="popupTitle" class="popup-title">สำเร็จ</p>
      <p id="popupMessage" class="popup-message">ข้อความ</p>

      <div id="popupActions" class="popup-actions">
        <button id="popupCancelBtn" class="popup-btn popup-btn-secondary">ยกเลิก</button>
        <button id="popupConfirmBtn" class="popup-btn popup-btn-primary">ตกลง</button>
      </div>
    </div>
  </div>

  <script type="module" src="attendance.js"></script>

</body>
</html>
